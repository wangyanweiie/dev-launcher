<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dev Launcher</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="alternate icon" href="/favicon.svg" />
        <meta name="theme-color" content="#1a1d27" />
        <script>
            (function () {
                var t = localStorage.getItem('dl-theme');
                if (t === 'light' || t === 'dark') {
                    document.documentElement.setAttribute('data-theme', t);
                } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            })();
        </script>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <h1>Dev Launcher</h1>
                <div class="scan-root-bar" id="scan-root-bar">
                    <label class="scan-root-label" for="scan-root-input">扫描目录</label>
                    <input
                        type="text"
                        id="scan-root-input"
                        class="scan-root-input"
                        spellcheck="false"
                        title="项目根目录，其下需含 App、Pc 等分类子文件夹"
                    />
                    <button type="button" class="btn btn-ghost btn-sm" id="btn-use-cwd" title="使用启动时的当前目录">
                        当前目录
                    </button>
                    <button type="button" class="btn btn-ghost btn-sm" id="btn-save-scan-root" title="保存为默认路径（不扫描）">
                        保存
                    </button>
                    <button type="button" class="btn btn-primary btn-sm" id="btn-scan-root" title="按当前路径扫描项目">
                        扫描
                    </button>
                </div>
                <p class="subtitle subtitle-warn" id="scan-root-hint" hidden></p>
            </div>
            <div class="header-actions">
                <button
                    type="button"
                    class="btn btn-ghost theme-toggle"
                    id="btn-theme-toggle"
                    aria-pressed="false"
                    title="切换到日间模式"
                >
                    <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
                    <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
                    <span class="theme-toggle-label">日间</span>
                </button>
                <input
                    type="search"
                    id="project-search"
                    class="search-input"
                    placeholder="搜索项目…"
                    autocomplete="off"
                />
                <button type="button" class="btn btn-ghost" id="btn-refresh" title="强制重新扫描当前目录">刷新列表</button>
                <button type="button" class="btn btn-danger" id="btn-stop-all">全部停止</button>
            </div>
        </header>

        <main class="main">
            <div id="loading" class="loading">正在扫描项目…</div>
            <nav id="category-tabs" class="category-tabs" hidden></nav>
            <div id="project-list" class="project-list"></div>
        </main>

        <aside class="sidebar-panel" id="sidebar-panel">
            <section class="services-panel" id="services-panel">
                <div class="services-section" data-section="managed" id="services-section-managed">
                    <button type="button" class="services-section-toggle" data-section="managed" aria-expanded="true">
                        <span class="section-chevron" aria-hidden="true"></span>
                        <span class="section-title">正在运行中的服务</span>
                        <span class="section-count" id="managed-count">0</span>
                    </button>
                    <div class="services-section-body">
                        <div id="managed-list" class="services-list"></div>
                    </div>
                </div>
                <div class="services-section" data-section="history" id="services-section-history" hidden>
                    <button type="button" class="services-section-toggle" data-section="history" aria-expanded="true">
                        <span class="section-chevron" aria-hidden="true"></span>
                        <span class="section-title">历史服务</span>
                        <span class="section-count" id="history-count">0</span>
                    </button>
                    <div class="services-section-body">
                        <div id="history-list" class="services-list"></div>
                    </div>
                </div>
            </section>
            <section class="log-panel" id="log-panel">
                <div class="log-header-bar">
                    <button
                        type="button"
                        class="log-panel-toggle"
                        id="log-panel-toggle"
                        aria-expanded="true"
                        title="点击折叠/展开日志"
                    >
                        <span class="section-chevron" aria-hidden="true"></span>
                        <span id="log-title" class="log-title-text">日志</span>
                    </button>
                    <button type="button" class="btn-icon" id="btn-clear-log" title="清空">×</button>
                </div>
                <pre class="log-body" id="log-body"></pre>
            </section>
        </aside>

        <script src="/app.js" type="module"></script>
    </body>
</html>
